# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.
#
# If you need help with YAML syntax, here are some quick references for you:
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/
#
# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: Technitribe
author: Tim Case
email: sales@lnx.cx
description: >- # this means to ignore newlines until "baseurl:"
  interesting problems (and a few solutions, too)
#baseurl: "/" # the subpath of your site, e.g. /blog
url: "https://blog.lnx.cx" # the base hostname & protocol for your site, e.g. http://example.com
#twitter_username: jekyllrb
github_username: timlnx
bluesky_username: lnx.cx
youtube_username: TimLNX
discogs_username: tim.lnx
instagram_username: tim.lnx
archive_username: tim_lnx
permalink: /:year/:month/:day/:title:output_ext
# Build settings
#theme: minima
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

kramdown:
  smart_quotes: ["apos", "apos", "quot", "quot"]

og:
  image:
    height: 300
    width: 300
    path: assets/opengraph/og-image-carl-300x300.png

# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will be automatically added to
# the internal "default list".
#
# Excluded items can be processed by explicitly listing the directories or
# their entries' file path in the `include:` list.
#
# exclude:
#   - .sass-cache/
#   - .jekyll-cache/
#   - gemfiles/
#   - Gemfile
#   - Gemfile.lock
#   - node_modules/
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/
# Everything the site is NOT. Jekyll has no allowlist mode, so this is a
# denylist and it has to be kept honest: anything tracked at the repo root that
# is not a page or an asset gets published unless it is named here. Paths
# starting with _ or . are skipped by Jekyll already, which is why _plugins/,
# _layouts/, and .github/ are absent from this list.
#
# Audit it after adding anything to the repo root:
#   blogenv/bin/python bin/validate-feed.py   # feed still sane
#   find _site -maxdepth 1                    # nothing surprising at the top
exclude:

  # -- Notes and docs written for people, not readers of the blog -------------
  - README.md
  - CLAUDE.md
  - AGENTS.md
  - DEPLOY.md
  - docs/

  # -- Repo tooling: build, deploy, and authoring helpers ---------------------
  # Every loose script lives in bin/ now, so this is one line instead of a list
  # of extensions that kept missing things (`new-post` has no extension at all,
  # and the old *.sh glob sailed straight past it).
  - bin/
  - deploy/
  - Containerfile
  - ansible.cfg
  - LICENSES/

  # -- Other people's trees --------------------------------------------------
  # Jekyll's stock node_modules exclude only covers the repo root, so the
  # extension's nested copy got published: a sprintf-js demo, tslib, and
  # uglify-js domprops.html all landed in the sitemap pointing at 404s.
  - vscode-extension/
  # The python virtualenvs. Both are ignored via .git/info/exclude, which is
  # local-only, so they never reach the server -- but build-local.sh mounts the
  # whole working copy into the container, and blogenv/bin/python is a symlink
  # to Homebrew python that dangles in there. Jekyll's reader opens every file
  # it does not exclude, so the container build died on a broken symlink.
  - blogenv/
  - ia/

  # -- Agent and build scratch space -----------------------------------------
  - .omc/
  - .remember/
  # scratch/ is gitignored, so anything in it is invisible to git status but
  # was still being read as site source. /pgp/ was publishing from an untracked
  # file in there. Keep drafts unbuilt as well as uncommitted.
  - scratch/
  # dest/ holds build output from container-build.sh. Jekyll was reading it back
  # in as source, so a local build republished the whole site under /dest/ and
  # put 92 duplicate URLs in the sitemap. Production builds from a clean tree so
  # it never shipped, but a deploy from a dirty _site would have.
  - dest/

header_pages:
  - about.markdown
  - projects.md
  - audio.markdown
  - socials.md
  - carl.markdown
